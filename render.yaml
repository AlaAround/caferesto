services:
  - type: web
    name: tableorder-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build -w @tableorder/shared && npm run build -w @tableorder/api
    startCommand: npm run start -w @tableorder/api
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
